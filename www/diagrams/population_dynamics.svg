    .edge { fill: none; stroke: #d7dfdc; stroke-width: 2.2; opacity: .72; }
    .sign { font: 700 17px Arial, sans-serif; fill: #101418; }
    .caption { font: 11px Arial, sans-serif; fill: #c7d1cd; }
