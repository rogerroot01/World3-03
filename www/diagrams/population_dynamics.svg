<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" role="img" aria-labelledby="title-population_dynamics desc-population_dynamics">
  <title id="title-population_dynamics">Population Dynamics</title>
  <desc id="desc-population_dynamics">Age cohorts mature, births add young people, and deaths remove people</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
