      <text x="405" y="116" text-anchor="middle">Desired Family Size</text>
      <text x="405" y="136" text-anchor="middle" class="kind">process</text>
    </g>
    <g class="node">
      <rect x="578" y="130" width="164" height="60" rx="10" fill="#24314a" stroke="#9eb0d6" stroke-width="2"/>
      <text x="660" y="156" text-anchor="middle">Fertility Control</text>
      <text x="660" y="176" text-anchor="middle" class="kind">process</text>
    </g>
    <g class="node">
      <rect x="323" y="295" width="164" height="60" rx="10" fill="#24314a" stroke="#9eb0d6" stroke-width="2"/>
      <text x="405" y="321" text-anchor="middle">Total Fertility</text>
      <text x="405" y="341" text-anchor="middle" class="kind">process</text>
    </g>
    <g class="node">
      <rect x="578" y="315" width="164" height="60" rx="10" fill="#4d2630" stroke="#d28a93" stroke-width="2"/>
      <text x="660" y="341" text-anchor="middle">Births</text>
      <text x="660" y="361" text-anchor="middle" class="kind">flow</text>
    </g>
    <g class="node">
      <rect x="323" y="490" width="164" height="60" rx="10" fill="#213d46" stroke="#8fb8a5" stroke-width="2"/>
      <text x="405" y="516" text-anchor="middle">Population</text>
      <text x="405" y="536" text-anchor="middle" class="kind">stock</text>
    </g>
</svg>
