<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" role="img" aria-labelledby="title-human_fertility desc-human_fertility">
  <title id="title-human_fertility">Human Fertility</title>
  <desc id="desc-human_fertility">How income, services, perceived lifetime, and fertility control shape births</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d7dfdc"/>
    </marker>
    <radialGradient id="bg" cx="30%" cy="20%" r="80%">
      <stop offset="0" stop-color="#243842"/>
      <stop offset="1" stop-color="#101418"/>
    </radialGradient>
  </defs>
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #f7f7f4; }
    .subtitle { font: 15px Arial, sans-serif; fill: #b8c5c0; }
    .node text { font: 700 14px Arial, sans-serif; fill: #f7f7f4; }
    .node .kind { font: 11px Arial, sans-serif; fill: #c6d0cc; opacity: .85; text-transform: uppercase; }
    .edge { fill: none; stroke: #d7dfdc; stroke-width: 2.2; opacity: .72; }
    .sign { font: 700 17px Arial, sans-serif; fill: #101418; }
    .caption { font: 11px Arial, sans-serif; fill: #c7d1cd; }
  </style>
  <rect width="980" height="720" rx="18" fill="url(#bg)"/>
  <path d="M70 620 C220 560 320 450 430 335 C560 200 710 145 900 180" fill="none" stroke="#b04a5a" stroke-width="4" opacity=".16"/>
  <path d="M70 580 C270 600 450 540 610 455 C740 386 835 390 900 430" fill="none" stroke="#d9c27f" stroke-width="3" opacity=".16"/>
  <text x="52" y="58" class="title">Human Fertility</text>
  <text x="52" y="86" class="subtitle">How income, services, perceived lifetime, and fertility control shape births</text>
  
    <path class="edge" d="M 160 245 C 335.0 260.0, 485.0 330.0, 660 345" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="410.0" cy="295.0" r="13" fill="#8fb8a5"/>
      <text x="410.0" y="300.0" text-anchor="middle" class="sign">+</text>
      <text x="410.0" y="324.0" text-anchor="middle" class="caption">reproductive cohort</text>
    </g>
    <path class="edge" d="M 405 120 C 405.0 150.8, 405.0 294.2, 405 325" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="405.0" cy="222.5" r="13" fill="#8fb8a5"/>
      <text x="405.0" y="227.5" text-anchor="middle" class="sign">+</text>
      <text x="405.0" y="251.5" text-anchor="middle" class="caption">desired children</text>
    </g>
    <path class="edge" d="M 660 160 C 570.8 184.8, 494.2 300.2, 405 325" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="532.5" cy="242.5" r="13" fill="#d28a93"/>
      <text x="532.5" y="247.5" text-anchor="middle" class="sign">-</text>
      <text x="532.5" y="271.5" text-anchor="middle" class="caption">effectiveness</text>
    </g>
    <path class="edge" d="M 405 325 C 494.2 328.0, 570.8 342.0, 660 345" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="532.5" cy="335.0" r="13" fill="#8fb8a5"/>
      <text x="532.5" y="340.0" text-anchor="middle" class="sign">+</text>
      <text x="532.5" y="364.0" text-anchor="middle" class="caption">birth rate</text>
    </g>
    <path class="edge" d="M 660 345 C 570.8 371.2, 494.2 493.8, 405 520" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="532.5" cy="432.5" r="13" fill="#8fb8a5"/>
      <text x="532.5" y="437.5" text-anchor="middle" class="sign">+</text>
      <text x="532.5" y="461.5" text-anchor="middle" class="caption">adds people</text>
    </g>
    <path class="edge" d="M 405 520 C 405.0 460.0, 405.0 180.0, 405 120" marker-end="url(#arrow)"/>
    <g class="edge-label">
