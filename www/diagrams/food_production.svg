<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" role="img" aria-labelledby="title-food_production desc-food_production">
  <title id="title-food_production">Food Production</title>
  <desc id="desc-food_production">Food depends on land, yield, inputs, capital allocation, and processing losses</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d7dfdc"/>
    </marker>
    <radialGradient id="bg" cx="30%" cy="20%" r="80%">
      <stop offset="0" stop-color="#243842"/>
      <stop offset="1" stop-color="#101418"/>
    </radialGradient>
  </defs>
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #f7f7f4; }
    .subtitle { font: 15px Arial, sans-serif; fill: #b8c5c0; }
    .node text { font: 700 14px Arial, sans-serif; fill: #f7f7f4; }
    .node .kind { font: 11px Arial, sans-serif; fill: #c6d0cc; opacity: .85; text-transform: uppercase; }
    .edge { fill: none; stroke: #d7dfdc; stroke-width: 2.2; opacity: .72; }
    .sign { font: 700 17px Arial, sans-serif; fill: #101418; }
    .caption { font: 11px Arial, sans-serif; fill: #c7d1cd; }
  </style>
  <rect width="980" height="720" rx="18" fill="url(#bg)"/>
  <path d="M70 620 C220 560 320 450 430 335 C560 200 710 145 900 180" fill="none" stroke="#b04a5a" stroke-width="4" opacity=".16"/>
  <path d="M70 580 C270 600 450 540 610 455 C740 386 835 390 900 430" fill="none" stroke="#d9c27f" stroke-width="3" opacity=".16"/>
  <text x="52" y="58" class="title">Food Production</text>
  <text x="52" y="86" class="subtitle">Food depends on land, yield, inputs, capital allocation, and processing losses</text>
  
    <path class="edge" d="M 690 130 C 599.0 130.0, 521.0 130.0, 430 130" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="560.0" cy="130.0" r="13" fill="#8fb8a5"/>
      <text x="560.0" y="135.0" text-anchor="middle" class="sign">+</text>
      <text x="560.0" y="159.0" text-anchor="middle" class="caption">investment</text>
    </g>
    <path class="edge" d="M 430 130 C 430.0 157.8, 430.0 287.2, 430 315" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="430.0" cy="222.5" r="13" fill="#8fb8a5"/>
      <text x="430.0" y="227.5" text-anchor="middle" class="sign">+</text>
      <text x="430.0" y="251.5" text-anchor="middle" class="caption">inputs/hectare</text>
    </g>
    <path class="edge" d="M 160 230 C 345.5 242.8, 504.5 302.2, 690 315" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="425.0" cy="272.5" r="13" fill="#8fb8a5"/>
      <text x="425.0" y="277.5" text-anchor="middle" class="sign">+</text>
      <text x="425.0" y="301.5" text-anchor="middle" class="caption">harvested land</text>
    </g>
    <path class="edge" d="M 430 315 C 521.0 315.0, 599.0 315.0, 690 315" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="560.0" cy="315.0" r="13" fill="#8fb8a5"/>
      <text x="560.0" y="320.0" text-anchor="middle" class="sign">+</text>
      <text x="560.0" y="344.0" text-anchor="middle" class="caption">yield</text>
    </g>
    <path class="edge" d="M 690 315 C 599.0 345.8, 521.0 489.2, 430 520" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="560.0" cy="417.5" r="13" fill="#8fb8a5"/>
      <text x="560.0" y="422.5" text-anchor="middle" class="sign">+</text>
      <text x="560.0" y="446.5" text-anchor="middle" class="caption">food supply</text>
    </g>
    <path class="edge" d="M 160 500 C 254.5 503.0, 335.5 517.0, 430 520" marker-end="url(#arrow)"/>
    <g class="edge-label">
