      <text x="160" y="226" text-anchor="middle">Arable Land</text>
      <text x="160" y="246" text-anchor="middle" class="kind">stock</text>
    </g>
    <g class="node">
      <rect x="348" y="100" width="164" height="60" rx="10" fill="#213d46" stroke="#8fb8a5" stroke-width="2"/>
      <text x="430" y="126" text-anchor="middle">Agricultural Inputs</text>
      <text x="430" y="146" text-anchor="middle" class="kind">stock</text>
    </g>
    <g class="node">
      <rect x="348" y="285" width="164" height="60" rx="10" fill="#24314a" stroke="#9eb0d6" stroke-width="2"/>
      <text x="430" y="311" text-anchor="middle">Land Yield</text>
      <text x="430" y="331" text-anchor="middle" class="kind">process</text>
    </g>
    <g class="node">
      <rect x="608" y="285" width="164" height="60" rx="10" fill="#4d2630" stroke="#d28a93" stroke-width="2"/>
      <text x="690" y="311" text-anchor="middle">Food Production</text>
      <text x="690" y="331" text-anchor="middle" class="kind">flow</text>
    </g>
    <g class="node">
      <rect x="78" y="470" width="164" height="60" rx="10" fill="#213d46" stroke="#8fb8a5" stroke-width="2"/>
      <text x="160" y="496" text-anchor="middle">Population</text>
      <text x="160" y="516" text-anchor="middle" class="kind">stock</text>
    </g>
    <g class="node">
      <rect x="348" y="490" width="164" height="60" rx="10" fill="#493f22" stroke="#d9c27f" stroke-width="2"/>
      <text x="430" y="516" text-anchor="middle">Food Per Capita</text>
      <text x="430" y="536" text-anchor="middle" class="kind">outcome</text>
    </g>
    <g class="node">
      <rect x="608" y="100" width="164" height="60" rx="10" fill="#24314a" stroke="#9eb0d6" stroke-width="2"/>
      <text x="690" y="126" text-anchor="middle">Industrial Output</text>
      <text x="690" y="146" text-anchor="middle" class="kind">process</text>
    </g>
</svg>
