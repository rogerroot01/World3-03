      <text x="430.0" y="324.0" text-anchor="middle" class="caption">care</text>
    </g>
    <path class="edge" d="M 690 170 C 599.0 207.5, 521.0 382.5, 430 420" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="560.0" cy="295.0" r="13" fill="#d28a93"/>
      <text x="560.0" y="300.0" text-anchor="middle" class="sign">-</text>
      <text x="560.0" y="324.0" text-anchor="middle" class="caption">toxicity</text>
    </g>
    <path class="edge" d="M 170 420 C 261.0 420.0, 339.0 420.0, 430 420" marker-end="url(#arrow)"/>
