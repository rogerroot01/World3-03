<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" role="img" aria-labelledby="title-life_expectancy desc-life_expectancy">
  <title id="title-life_expectancy">Life Expectancy</title>
  <desc id="desc-life_expectancy">Life expectancy integrates food, services, pollution, and crowding effects</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d7dfdc"/>
    </marker>
    <radialGradient id="bg" cx="30%" cy="20%" r="80%">
      <stop offset="0" stop-color="#243842"/>
      <stop offset="1" stop-color="#101418"/>
    </radialGradient>
  </defs>
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #f7f7f4; }
    .subtitle { font: 15px Arial, sans-serif; fill: #b8c5c0; }
    .node text { font: 700 14px Arial, sans-serif; fill: #f7f7f4; }
    .node .kind { font: 11px Arial, sans-serif; fill: #c6d0cc; opacity: .85; text-transform: uppercase; }
    .edge { fill: none; stroke: #d7dfdc; stroke-width: 2.2; opacity: .72; }
    .sign { font: 700 17px Arial, sans-serif; fill: #101418; }
    .caption { font: 11px Arial, sans-serif; fill: #c7d1cd; }
  </style>
  <rect width="980" height="720" rx="18" fill="url(#bg)"/>
  <path d="M70 620 C220 560 320 450 430 335 C560 200 710 145 900 180" fill="none" stroke="#b04a5a" stroke-width="4" opacity=".16"/>
  <path d="M70 580 C270 600 450 540 610 455 C740 386 835 390 900 430" fill="none" stroke="#d9c27f" stroke-width="3" opacity=".16"/>
  <text x="52" y="58" class="title">Life Expectancy</text>
  <text x="52" y="86" class="subtitle">Life expectancy integrates food, services, pollution, and crowding effects</text>
  
    <path class="edge" d="M 170 170 C 261.0 207.5, 339.0 382.5, 430 420" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="300.0" cy="295.0" r="13" fill="#8fb8a5"/>
      <text x="300.0" y="300.0" text-anchor="middle" class="sign">+</text>
      <text x="300.0" y="324.0" text-anchor="middle" class="caption">nutrition</text>
    </g>
    <path class="edge" d="M 430 170 C 430.0 207.5, 430.0 382.5, 430 420" marker-end="url(#arrow)"/>
    <g class="edge-label">
