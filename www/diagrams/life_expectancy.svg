      <text x="170" y="416" text-anchor="middle">Crowding</text>
      <text x="170" y="436" text-anchor="middle" class="kind">process</text>
    </g>
    <g class="node">
      <rect x="348" y="390" width="164" height="60" rx="10" fill="#493f22" stroke="#d9c27f" stroke-width="2"/>
      <text x="430" y="416" text-anchor="middle">Life Expectancy</text>
