<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" role="img" aria-labelledby="title-labor_force desc-labor_force">
  <title id="title-labor_force">Utilization of the Labor Force</title>
  <desc id="desc-labor_force">Jobs, labor force, and utilization affect capital use and output</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d7dfdc"/>
    </marker>
    <radialGradient id="bg" cx="30%" cy="20%" r="80%">
      <stop offset="0" stop-color="#243842"/>
      <stop offset="1" stop-color="#101418"/>
    </radialGradient>
  </defs>
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #f7f7f4; }
    .subtitle { font: 15px Arial, sans-serif; fill: #b8c5c0; }
    .node text { font: 700 14px Arial, sans-serif; fill: #f7f7f4; }
    .node .kind { font: 11px Arial, sans-serif; fill: #c6d0cc; opacity: .85; text-transform: uppercase; }
    .edge { fill: none; stroke: #d7dfdc; stroke-width: 2.2; opacity: .72; }
    .sign { font: 700 17px Arial, sans-serif; fill: #101418; }
    .caption { font: 11px Arial, sans-serif; fill: #c7d1cd; }
  </style>
  <rect width="980" height="720" rx="18" fill="url(#bg)"/>
  <path d="M70 620 C220 560 320 450 430 335 C560 200 710 145 900 180" fill="none" stroke="#b04a5a" stroke-width="4" opacity=".16"/>
  <path d="M70 580 C270 600 450 540 610 455 C740 386 835 390 900 430" fill="none" stroke="#d9c27f" stroke-width="3" opacity=".16"/>
  <text x="52" y="58" class="title">Utilization of the Labor Force</text>
  <text x="52" y="86" class="subtitle">Jobs, labor force, and utilization affect capital use and output</text>
  
    <path class="edge" d="M 170 220 C 261.0 220.0, 339.0 220.0, 430 220" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="300.0" cy="220.0" r="13" fill="#8fb8a5"/>
      <text x="300.0" y="225.0" text-anchor="middle" class="sign">+</text>
      <text x="300.0" y="249.0" text-anchor="middle" class="caption">participation</text>
    </g>
    <path class="edge" d="M 690 220 C 599.0 250.0, 521.0 390.0, 430 420" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="560.0" cy="320.0" r="13" fill="#8fb8a5"/>
      <text x="560.0" y="325.0" text-anchor="middle" class="sign">+</text>
      <text x="560.0" y="349.0" text-anchor="middle" class="caption">job capacity</text>
    </g>
    <path class="edge" d="M 430 220 C 430.0 250.0, 430.0 390.0, 430 420" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="430.0" cy="320.0" r="13" fill="#d28a93"/>
      <text x="430.0" y="325.0" text-anchor="middle" class="sign">-</text>
      <text x="430.0" y="349.0" text-anchor="middle" class="caption">available workers</text>
    </g>
    <path class="edge" d="M 430 420 C 521.0 420.0, 599.0 420.0, 690 420" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="560.0" cy="420.0" r="13" fill="#8fb8a5"/>
      <text x="560.0" y="425.0" text-anchor="middle" class="sign">+</text>
      <text x="560.0" y="449.0" text-anchor="middle" class="caption">utilization delay</text>
    </g>
    <path class="edge" d="M 690 420 C 599.0 447.0, 521.0 573.0, 430 600" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="560.0" cy="510.0" r="13" fill="#8fb8a5"/>
      <text x="560.0" y="515.0" text-anchor="middle" class="sign">+</text>
      <text x="560.0" y="539.0" text-anchor="middle" class="caption">effective capital</text>
    </g>
    <g class="node">
      <rect x="88" y="190" width="164" height="60" rx="10" fill="#213d46" stroke="#8fb8a5" stroke-width="2"/>
      <text x="170" y="216" text-anchor="middle">Population 15-64</text>
      <text x="170" y="236" text-anchor="middle" class="kind">stock</text>
    </g>
    <g class="node">
      <rect x="348" y="190" width="164" height="60" rx="10" fill="#24314a" stroke="#9eb0d6" stroke-width="2"/>
      <text x="430" y="216" text-anchor="middle">Labor Force</text>
      <text x="430" y="236" text-anchor="middle" class="kind">process</text>
    </g>
    <g class="node">
      <rect x="608" y="190" width="164" height="60" rx="10" fill="#24314a" stroke="#9eb0d6" stroke-width="2"/>
      <text x="690" y="216" text-anchor="middle">Jobs</text>
      <text x="690" y="236" text-anchor="middle" class="kind">process</text>
    </g>
    <g class="node">
      <rect x="348" y="390" width="164" height="60" rx="10" fill="#493f22" stroke="#d9c27f" stroke-width="2"/>
      <text x="430" y="416" text-anchor="middle">Labor Utilization</text>
      <text x="430" y="436" text-anchor="middle" class="kind">outcome</text>
    </g>
    <g class="node">
      <rect x="608" y="390" width="164" height="60" rx="10" fill="#493f22" stroke="#d9c27f" stroke-width="2"/>
      <text x="690" y="416" text-anchor="middle">Capital Utilization</text>
      <text x="690" y="436" text-anchor="middle" class="kind">outcome</text>
    </g>
    <g class="node">
      <rect x="348" y="570" width="164" height="60" rx="10" fill="#4d2630" stroke="#d28a93" stroke-width="2"/>
      <text x="430" y="596" text-anchor="middle">Industrial Output</text>
      <text x="430" y="616" text-anchor="middle" class="kind">flow</text>
    </g>
</svg>
