<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" role="img" aria-labelledby="title-service_investment desc-service_investment">
  <title id="title-service_investment">Investments in the Service Sector</title>
  <desc id="desc-service_investment">Industrial output allocated to services builds service capital and service output</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d7dfdc"/>
    </marker>
    <radialGradient id="bg" cx="30%" cy="20%" r="80%">
      <stop offset="0" stop-color="#243842"/>
      <stop offset="1" stop-color="#101418"/>
    </radialGradient>
  </defs>
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #f7f7f4; }
    .subtitle { font: 15px Arial, sans-serif; fill: #b8c5c0; }
    .node text { font: 700 14px Arial, sans-serif; fill: #f7f7f4; }
    .node .kind { font: 11px Arial, sans-serif; fill: #c6d0cc; opacity: .85; text-transform: uppercase; }
    .edge { fill: none; stroke: #d7dfdc; stroke-width: 2.2; opacity: .72; }
    .sign { font: 700 17px Arial, sans-serif; fill: #101418; }
    .caption { font: 11px Arial, sans-serif; fill: #c7d1cd; }
  </style>
  <rect width="980" height="720" rx="18" fill="url(#bg)"/>
  <path d="M70 620 C220 560 320 450 430 335 C560 200 710 145 900 180" fill="none" stroke="#b04a5a" stroke-width="4" opacity=".16"/>
  <path d="M70 580 C270 600 450 540 610 455 C740 386 835 390 900 430" fill="none" stroke="#d9c27f" stroke-width="3" opacity=".16"/>
  <text x="52" y="58" class="title">Investments in the Service Sector</text>
  <text x="52" y="86" class="subtitle">Industrial output allocated to services builds service capital and service output</text>
  
    <path class="edge" d="M 160 250 C 247.5 264.2, 322.5 330.8, 410 345" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="285.0" cy="297.5" r="13" fill="#8fb8a5"/>
      <text x="285.0" y="302.5" text-anchor="middle" class="sign">+</text>
      <text x="285.0" y="326.5" text-anchor="middle" class="caption">available output</text>
    </g>
    <path class="edge" d="M 410 145 C 410.0 175.0, 410.0 315.0, 410 345" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="410.0" cy="245.0" r="13" fill="#8fb8a5"/>
      <text x="410.0" y="250.0" text-anchor="middle" class="sign">+</text>
      <text x="410.0" y="274.0" text-anchor="middle" class="caption">allocation</text>
    </g>
    <path class="edge" d="M 410 345 C 497.5 345.0, 572.5 345.0, 660 345" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="535.0" cy="345.0" r="13" fill="#8fb8a5"/>
      <text x="535.0" y="350.0" text-anchor="middle" class="sign">+</text>
      <text x="535.0" y="374.0" text-anchor="middle" class="caption">capital growth</text>
    </g>
    <path class="edge" d="M 660 345 C 660.0 375.0, 660.0 515.0, 660 545" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="660.0" cy="445.0" r="13" fill="#8fb8a5"/>
      <text x="660.0" y="450.0" text-anchor="middle" class="sign">+</text>
      <text x="660.0" y="474.0" text-anchor="middle" class="caption">output capacity</text>
    </g>
    <path class="edge" d="M 660 545 C 572.5 545.0, 497.5 545.0, 410 545" marker-end="url(#arrow)"/>
    <g class="edge-label">
      <circle cx="535.0" cy="545.0" r="13" fill="#8fb8a5"/>
      <text x="535.0" y="550.0" text-anchor="middle" class="sign">+</text>
      <text x="535.0" y="574.0" text-anchor="middle" class="caption">service per capita</text>
    </g>
    <g class="node">
      <rect x="78" y="220" width="164" height="60" rx="10" fill="#4d2630" stroke="#d28a93" stroke-width="2"/>
      <text x="160" y="246" text-anchor="middle">Industrial Output</text>
      <text x="160" y="266" text-anchor="middle" class="kind">flow</text>
    </g>
    <g class="node">
      <rect x="328" y="115" width="164" height="60" rx="10" fill="#24314a" stroke="#9eb0d6" stroke-width="2"/>
      <text x="410" y="141" text-anchor="middle">Fraction to Services</text>
      <text x="410" y="161" text-anchor="middle" class="kind">process</text>
    </g>
    <g class="node">
      <rect x="328" y="315" width="164" height="60" rx="10" fill="#4d2630" stroke="#d28a93" stroke-width="2"/>
      <text x="410" y="341" text-anchor="middle">Service Investment</text>
      <text x="410" y="361" text-anchor="middle" class="kind">flow</text>
    </g>
    <g class="node">
      <rect x="578" y="315" width="164" height="60" rx="10" fill="#213d46" stroke="#8fb8a5" stroke-width="2"/>
      <text x="660" y="341" text-anchor="middle">Service Capital</text>
      <text x="660" y="361" text-anchor="middle" class="kind">stock</text>
    </g>
    <g class="node">
      <rect x="578" y="515" width="164" height="60" rx="10" fill="#4d2630" stroke="#d28a93" stroke-width="2"/>
      <text x="660" y="541" text-anchor="middle">Service Output</text>
      <text x="660" y="561" text-anchor="middle" class="kind">flow</text>
    </g>
    <g class="node">
      <rect x="328" y="515" width="164" height="60" rx="10" fill="#493f22" stroke="#d9c27f" stroke-width="2"/>
      <text x="410" y="541" text-anchor="middle">Health &amp; Fertility Services</text>
      <text x="410" y="561" text-anchor="middle" class="kind">outcome</text>
    </g>
</svg>
