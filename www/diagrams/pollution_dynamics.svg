<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" role="img" aria-labelledby="title-pollution_dynamics desc-pollution_dynamics">
  <title id="title-pollution_dynamics">Pollution Dynamics</title>
  <desc id="desc-pollution_dynamics">Industrial and agricultural activity generate persistent pollution, which affects health and yield</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d7dfdc"/>
